services:
  action-gls:
    image: ${ACTION_IMAGE_REGISTRY}/gls-action:${ACTION_IMAGE_TAG}
    environment:
      ACTION_ID: ${AQUILA_ACTION_GLS_IDENTIFIER}
      AUTH_TOKEN: ${AQUILA_ACTION_GLS_TOKEN}
      AQUILA_URL: aquila:8081
    depends_on:
      - aquila
    networks:
      - aquila
    restart: unless-stopped

  action-shopify:
    image: ${ACTION_IMAGE_REGISTRY}/shopify-action:${ACTION_IMAGE_TAG}
    environment:
      ACTION_ID: ${AQUILA_ACTION_SHOPIFY_IDENTIFIER}
      AUTH_TOKEN: ${AQUILA_ACTION_SHOPIFY_TOKEN}
      AQUILA_URL: aquila:8081
    depends_on:
      - aquila
    networks:
      - aquila
    restart: unless-stopped
